#       can absorb all damage). Max is uncapped in formula but tuning knob
#       damage_cap in combat.md clamps at 999."
#     added: 2026-03-26
#     revised: ""


# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: D_player_base
    status: active
    source: design/gdd/integrity-system.md
    referenced_by:
      - design/gdd/integrity-system.md
      - design/gdd/character-system.md  # feeds T_board via D_agg; confirmed baseline 8 at MVP
      - design/gdd/angel-system.md  # feeds D_agg for WAS-based HP calibration baseline
    value: 8
    unit: damage-per-player-per-turn
    notes: "Expected damage per player per turn at honest play with basic equipment
      and items. 2D6 on damage slots: 2 * 3.5 = 7.0 base + ~1 for item contribution.
      Angel System must use D_agg = n * 8 as the HP calibration baseline.
      If playtest shows consistent over/underperformance, update this value and
      re-derive all Angel HP values from the HP bounds formula."
    added: 2026-05-24
    revised: ""

  - name: HP_alpha
    status: deprecated
    source: design/gdd/integrity-system.md
    referenced_by:
      - design/gdd/integrity-system.md
    value: 0.6
    unit: coefficient
    notes: "DEPRECATED 2026-05-27 — Angel System redesign replaced HP_alpha/HP_beta bounds
      model with WAS-based per-slot HP calibration (Angel System Formula 2, HP ∈ [4, 14]).
      Players have no HP — this constant was always Angel-only but is now superseded entirely.
      HP_min = ceil(HP_alpha * D_agg) formula is no longer used. See integrity-system.md
