# ─── ITEMS ───────────────────────────────────────────────────────────────────
# Named collectables, equipment, consumables, crafting materials, currency.
# Register an item when its name or value appears in more than one GDD.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: value_gold, weight, stackable, category, and any stat
#   modifiers that another system (e.g., economy, crafting) might reference.

items: []

# Example:
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # drop defined in combat GDD
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD lists its weight/stack rules
#       - design/gdd/economy.md      # economy GDD references its sell price
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: D_agg
    status: active
    source: design/gdd/integrity-system.md
    referenced_by:
      - design/gdd/integrity-system.md
      - design/gdd/character-system.md  # feeds T_board calculation; verifies T_board per character
      - design/gdd/equipment-degradation.md  # feeds N_strips guardrail (N_strips < L_total)
      - design/gdd/angel-system.md  # WAS-based HP calibration uses D_agg as damage baseline per slot
    variables:
      - n  # party size, int {1,2,3,4}
      - D_player_base  # expected damage per player per turn, float [7,10]; baseline = 8
    output_range: [7, 40]
    expression: "n * D_player_base"
    notes: "Aggregate expected party damage per turn. Calibration baseline D_player_base = 8
      (2D6 on damage slots, honest play with basic items). Angel System must use this to
      validate HP bounds. Character System must use this when verifying T_board."
    added: 2026-05-24
    revised: ""

  - name: T_angel
    status: active
    source: design/gdd/integrity-system.md
    referenced_by:
      - design/gdd/integrity-system.md
      - design/gdd/angel-system.md  # per-slot layer HP must keep T_angel ∈ [1.0, 3.0]
    variables:
      - HP_L  # Angel layer HP, int; now calibrated by WAS-based Angel System Formula 2, HP ∈ [4, 14]
      - D_agg  # aggregate party damage per turn (see D_agg formula)
      - P_strip  # probability D_turn >= HP_L in one turn, float (0,1]
    output_range: [1.0, "infinity"]
    expression: "1 / P(D_turn >= HP_L)  [geometric distribution mean]"
    notes: "Expected turns to strip one Angel layer. Values > 3.0 are degenerate for the
      5-8 minute encounter target. HP_L inputs are now calibrated by Angel System Formula 2
      (WAS-based, HP ∈ [4, 14] per slot layer) — the old HP_alpha/HP_beta bounds formula
      (Integrity System F4) is deprecated. T_angel validity range [1.0, 3.0] unchanged.
      (2026-05-27: HP_alpha/HP_beta deprecated; HP_L range updated to [4, 14].)"
    added: 2026-05-24
    revised: "2026-05-27"

  - name: T_board
    status: active
    source: design/gdd/integrity-system.md
    referenced_by:
      - design/gdd/integrity-system.md
      - design/gdd/character-system.md  # verifies T_board per character (Formula 1); Pilgrim=8.0, Martyr=10.0 at H_pt=1.0
      - design/gdd/equipment-degradation.md  # N_strips guardrail references T_board; T_board ≥ T_encounter required
    variables:
      - L_total  # total layers across all 3 slots, int [3,∞); defined by Character System
      - H_pt  # expected hits per player per turn, float [0.5,3.0]; defined by Angel System
    output_range: [1.0, "infinity"]
    expression: "L_total / H_pt"
    notes: "Expected turns until one player board is destroyed. Must be >= encounter
      length in turns under worst-case routing. Evaluate at both average and worst-case
      routing when designing characters."
    added: 2026-05-24
    revised: ""

  - name: P_angel
    status: active
    source: design/gdd/dice-economy.md
    referenced_by:
      - design/gdd/dice-economy.md
      - design/gdd/angel-system.md  # trigger face assignments on slot layer cards calibrated against P_angel distribution
    variables:
      - k  # Angel face value, int {1,2,3,4,5,6}
      - F  # CDF: F(k) = 3*(k/6)^2 - 2*(k/6)^3
    output_range: [0.074, 0.241]
    expression: "F(k) - F(k-1)  where  F(k) = 3*(k/6)^2 - 2*(k/6)^3"
    notes: "Probability that the Angel's 3D6 middle-die shows face k. Peak at faces
      3 and 4 (~24.1% each), minimum at faces 1 and 6 (~7.4% each). Angel board
      face assignments must be calibrated against this distribution."
    added: 2026-05-23
    revised: ""

  - name: E_slot
    status: active
    source: design/gdd/equipment-system.md
    referenced_by:
      - design/gdd/equipment-system.md
      - design/gdd/character-system.md  # starting sets use E_slot to verify balance (Formula 4 / S_encounter check)
      - design/gdd/equipment-degradation.md  # each layer in a set must have E_slot calibrated (S_layer formula uses E_slot per layer)
      - design/gdd/item-system.md  # Formula 1 (E_item) uses p_c lookup from E_slot table; S_combined uses E_slot indirectly
    variables:
      - p_c    # activation probability, float (0.0, 1.0]
      - k      # output multiplier (k=1 for [N], k=2 for [N]×2, k=0 for fixed)
      - E_N_c  # E[N | constraint], from lookup table; unconstrained = 4.47
    output_range: [0, 14]
    expression: "p_c × k × E[N | constraint]"
    notes: "Expected per-turn output of a single equipment zone. Unconstrained baseline
      at k=1: 4.47. Cap of k=2 without compensating constraint or one-shot condition.
      Fixed-value effects: use the fixed value directly (k=0 path not in formula)."
    added: 2026-05-25
    revised: ""

  - name: S_encounter
    status: active
    source: design/gdd/equipment-system.md
    referenced_by:
      - design/gdd/equipment-system.md
      - design/gdd/character-system.md  # verifies each starting set; Pilgrim ≈65 (Penetrating-gated); Martyr ≈79.5 (DEFERRED self-cost)
      - design/gdd/equipment-degradation.md  # S_layer formula must keep each layer's S_encounter contribution in [54,74] band
      - design/gdd/item-system.md  # S_combined formula is built on top of S_encounter_base; item-system.md references the [54,74] band
    variables:
      - S_throughput  # sum of E_slot for recurring zones, float
      - T_encounter   # expected turns per encounter, float [6,10]; use 8 for MVP
      - B_burst       # total burst credit from one-shot and conditional zones, float
    output_range: [0, 120]
    expression: "(S_throughput × T_encounter) + B_burst"
    notes: "Encounter-level output for a complete equipment set. All sets target [54, 74]
      at T_encounter=8. No power tiers — shape of power varies, total does not.
      Martyrdom set computed at 17.24 (under-budget — must be redesigned before production)."
    added: 2026-05-25
    revised: ""

  - name: T_accum
    status: active
    source: design/gdd/dice-economy.md
    referenced_by:
      - design/gdd/dice-economy.md
      - design/gdd/equipment-system.md  # Formula 2 — Accumulate trigger timing calibration
      - design/gdd/item-system.md  # Formula 2 (ΔS_threshold) uses T_accum to compute trigger frequency change from threshold reduction
    variables:
      - X  # Accumulate threshold, int [4,20]
      - p  # feeding probability, float (0.0,1.0]; ~0.65 at honest play
      - E_N  # expected value of placed die = 3.5 (locked, fair d6)
    output_range: ["X/6", "infinity"]
    expression: "X / (p * E[N])  where  E[N] = 3.5"
    notes: "Expected turns to trigger an Accumulate effect. At honest competitive
      play p ≈ 0.65, giving effective input ~2.75/turn. Use with Accumulate threshold
      design tiers (Tick 5-6, Charge 8-12, Ritual 15-18) to calibrate card power."
    added: 2026-05-23
    revised: ""

  - name: N_strips
    status: active
    source: design/gdd/equipment-degradation.md
    referenced_by:
      - design/gdd/equipment-degradation.md
      - design/gdd/combat-system.md  # Section F — referenced in EPC context; N_strips guardrail applies to Angel encounter design
    variables:
      - H_pt   # expected hits taken per player per turn, float [0.5,3.0]; defined by Angel System; use 1.0 for MVP
      - T_encounter  # expected turns per encounter, float [6,10]; use 8 for MVP
    output_range: [3.0, 30.0]
    expression: "H_pt × T_encounter"
    notes: "Expected total layer strips per player per encounter. Guardrail: N_strips < L_total
      (player must not lose all layers in one encounter). At MVP (H_pt=1.0, T_encounter=8):
      N_strips=8.0. Pilgrim L_total=8 is the binding constraint — exactly at limit.
      If H_pt rises above 1.0 in playtests, Pilgrim L_total must increase.
      Feeds Tuning Knob 1 (layer count) and Tuning Knob 3 (self-strip cost calibration)."
    added: 2026-05-25
    revised: ""

  - name: S_layer
    status: active
    source: design/gdd/equipment-degradation.md
    referenced_by:
      - design/gdd/equipment-degradation.md
      - design/gdd/item-system.md  # item modifiers add to individual layer output; E_item formula uses T_active from S_layer; S_combined uses S_layer sum as baseline
    variables:
      - E_slot_i  # expected per-turn output of zone i on layer i, float; from E_slot formula
      - T_active_i  # expected turns this layer is active (= 1 / H_pt for MVP), float
      - B_burst_i   # burst credit from one-shot/conditional effects on layer i, float
    output_range: [0, "layer-dependent"]
    expression: "S_layer(i) = E_slot(i) × T_active(i) + B_burst(i);  sum across layers ∈ [54, 74]"
    notes: "Per-layer contribution to total encounter output. The SUM across all layers of a
      set must fall in [54, 74] — the same S_encounter band that applies to the full set.
      Individual layers may be above or below this band; it is the total that must balance.
      Martyr Body example: L1 E_slot=4.47 × T=1 + B=0 = 4.47; sum across 4 layers ≈ 17.88–26.82
      depending on layer shape. Full balance DEFERRED until playtests confirm P_strip values."
    added: 2026-05-25
    revised: ""

  - name: A_weapon
    status: active
    source: design/gdd/equipment-degradation.md
    referenced_by:
      - design/gdd/equipment-degradation.md
      - design/gdd/combat-system.md  # Section F — Martyr self-strip edge case (EC-13 / AC-22) depends on A_weapon charge count
    variables:
      - N_weapon_layers  # number of layers in the Weapon slot, int; defined by Character System
    output_range: [1, 5]
    expression: "A_weapon = N_weapon_layers"
    notes: "Total self-strip charges available in the Weapon slot. Equals number of Weapon layers.
      Martyr Weapon has 3 layers → A_weapon=3. Each self-strip (Lose 1 Integrity on Weapon)
      reveals the next Weapon layer exactly as a hit would. When A_weapon=0, Weapon slot is
      inert — no further self-strips possible. B_weapon_total (Martyr) = 8.94 + 13.41 + 17.88 = 40.23.
      Feeds the Martyr S_encounter DEFERRED calibration (D-3 in equipment-degradation.md)."
    added: 2026-05-25
    revised: ""

  - name: E_item
    status: active
    source: design/gdd/item-system.md
    referenced_by:
      - design/gdd/item-system.md
      - design/gdd/combat-system.md  # Section D — C_item variable in T_round formula counts active items; E_item is the basis for C_item β coefficient
    variables:
      - p_c       # activation probability of host zone, float (0.0, 1.0]; from E_slot lookup
      - k_bonus   # flat bonus value on the item card ("+k"), int [1, 6]
      - T_active  # expected turns item is live on its host layer, float [0, T_encounter]; ≈ 1/H_pt per layer
    output_range: [0, 6]
    expression: "E_item = p_c × k_bonus × T_active   (per-turn contribution while attached)"
    notes: "Per-turn output contribution of a Type 2 (Output Amplification) item.
      Encounter contribution: E_item_encounter = E_item × T_active = p_c × k_bonus × T_active².
      For passive zone items (Ruling A): E_passive_item = P_strip × k_bonus.
      Design-time check only — not computed at the table. Feeds S_combined formula."
    added: 2026-05-25
    revised: ""

  - name: T_round
    status: active
    source: design/gdd/combat-system.md
    referenced_by:
      - design/gdd/combat-system.md
      # design/gdd/events-system.md — add when authored; EPC uses T_round to validate encounter pacing
    variables:
      - T_base   # base time for Phases 1-3 (fixed overhead), seconds; baseline = 25s; range [20, 35]
      - n        # party size, int {1,2,3,4}
      - α_4      # per-player time cost for Phase 4 (placement discussion), seconds; baseline = 10s; range [5, 15]
      - α_5      # per-player time cost for Phase 5 (effect resolution), seconds; baseline = 10s; range [5, 15]
      - α_6      # per-player time cost for Phase 6 (hit routing), seconds; baseline = 5s; range [2, 7]
      - C_item   # count of active items on the table this round, int {0, 1} for MVP (0=no items; 1=any items active)
      - β        # per-item time overhead (reading text, checking conditions), seconds; baseline = 15s; range [10, 20]
    output_range: [37, 193]
    expression: "T_round = T_base + (α_4 × n) + (α_5 × n) + (α_6 × n) + (C_item × β)"
    notes: "Round duration estimate in seconds. Calibration target: T_round ≈ 90 s at
      n=2, C_item=1, all baselines. Output range [37, 193]: min at n=1, C_item=0,
      all minimums (25+5+5+2+0=37); max at n=4, C_item=1, all maximums
      (35+60+60+28+20=203 — note: 193 is GDD-body corrected value at baseline maximums).
      AC-26 is DEFERRED to playtest for coefficient calibration. Updated 2026-05-26
      to match GDD-body values (cross-review B-CON-1 fix)."
    added: 2026-05-26
    revised: "2026-05-26"

  - name: EPC
    status: active
    source: design/gdd/combat-system.md
    referenced_by:
      - design/gdd/combat-system.md
      - design/gdd/angel-system.md  # every Angel design must pass EPC before production; WAS + EPC are mandatory paired checks
      - design/gdd/events-system.md  # encounter card design formula gate references EPC (Card Design Formula Gates table)
    variables:
      - T_session_lo   # minimum target encounter duration, seconds; = 300 (5 min)
      - T_session_hi   # maximum target encounter duration, seconds; = 480 (8 min)
      - T_round        # round duration estimate in seconds (see T_round formula)
      - T_encounter_actual  # designer-specified number of turns for this encounter, int
    output_range: ["PASS", "WARN"]
    expression: "T_lo = ⌈T_session_lo / T_round⌉;  T_hi = ⌊T_session_hi / T_round⌋;
      PASS if T_encounter_actual ∈ [T_lo, T_hi];  WARN otherwise"
    notes: "Encounter Pacing Check — design-time validation tool. Not computed at the table.
      Distinct from T_encounter=8 balance constant (owned by Equipment System / S_encounter).
      T_encounter=8 is a calibration assumption for equipment output formulas.
      T_encounter_actual is the per-Angel output of EPC and validates encounter length.
      Example at T_round=90s: T_lo=4, T_hi=5. Example at T_round=120s: T_lo=3, T_hi=4."
    added: 2026-05-26
    revised: ""

  - name: S_combined
    status: active
    source: design/gdd/item-system.md
    referenced_by:
      - design/gdd/item-system.md
      - design/gdd/combat-system.md  # Section F and Tuning Knob 3 — post-combat item award links to S_combined advisory gate; combat balance verifies ≤85 not exceeded
    variables:
      - S_encounter_base  # equipment set S_encounter without items, float [54, 74]; from S_encounter formula
      - E_item_encounter  # per-item encounter contribution from Type 2 items (Formula 1), float [0, ~20 aggregate]
      - ΔS_threshold      # per-item encounter delta from Type 3 items (Formula 2), float [0, ~15 aggregate]
    output_range: [54, 105]
    expression: "S_combined = S_encounter_base + Σ E_item_encounter(i) + Σ ΔS_threshold(j)"
    notes: "Combined encounter output of an equipment set plus all attached items.
      Balance gates: advisory ≤85 (design review); hard production gate ≤105 (degenerate above 105).
      Lower bound ≥54: items should not reduce output (net-negative items are misdesigns).
      Design-time check only. Type 1 items: re-run E_slot with modified constraint; recompute S_encounter_base.
      Type 4 items: no S_combined change — check D_agg separately for damage→heal mutations."
    added: 2026-05-25
    revised: ""

# Example:
#
# formulas:
#   - name: damage_formula
#     status: active
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/progression.md   # progression GDD scales attack variable
#     variables:
#       - attack
#       - defense
#       - crit_chance
#       - crit_multiplier
